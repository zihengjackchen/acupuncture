<article class="doctor-card" data-reveal>
  {{ if .Params.image }}
  <div class="doctor-card-image">
    <img width="420" height="460" alt="Photo of {{ .Title }}" class="img-fluid" src="{{ .Params.image | relURL }}" />
  </div>
  {{ end }}
  <div class="doctor-card-content">
    <span class="section-kicker">Lead practitioner</span>
    <h2 class="team-name">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
    <p class="team-description">{{ .Params.Jobtitle }}</p>
    <p>{{ .Plain | replaceRE "\\s+" " " | strings.TrimSpace | truncate 250 "..." }}</p>
    {{ with .Params.focus_areas }}
    <ul class="sidebar-list">
      {{ range first 3 . }}
      <li>{{ . }}</li>
      {{ end }}
    </ul>
    {{ end }}
    <a class="text-link" href="{{ .RelPermalink }}">Meet Dr. Dan Wang</a>
  </div>
</article>
