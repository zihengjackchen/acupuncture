<article class="team-mini-card" data-reveal>
  {{ if .Params.image }}
  <div class="team-mini-card-image">
    <img width="300" height="300" alt="Photo of {{ .Title }}" class="img-fluid" src="{{ .Params.image | relURL }}" />
  </div>
  {{ end }}
  <div class="team-mini-card-content">
    <h2 class="team-name">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
    <p class="team-description">{{ .Params.Jobtitle }}</p>
  </div>
</article>
