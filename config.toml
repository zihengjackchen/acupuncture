baseURL = "/"
themesDir = "themes"
theme = "hugo-serif-theme"
languageCode = "en-us"
title = "Wang's Harmony Acupuncture LLC"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.55.0"

[params]
  # In most cases you will only want to set the google_analytics_id OR the google_tag_manager_id. If you have Google Analytics included in your GTM tags don't put your GA ID here. Otherwise your data might be useless.
  google_analytics_id = ""
  google_tag_manager_id = ""
  favicon = "favicon-32x32.svg"

  [params.homepage]
    sticky_header = true
    show_contact_box = false     # show / hide the contaxt box on the homepage
    show_services_button = false # show / hide the "view all services" button

  [params.logo]
    mobile = "images/logo/text-only-cropped.svg"
    mobile_height = "28px"
    desktop = "images/logo/text-only-cropped.svg"
    desktop_height = "32px"
    alt = "Wang's Harmony Acupuncture LLC"

  [params.fonts]
    # sets the google font link in layouts/partials/google-fonts.html
    google_fonts = 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap'
    heading = "Cormorant Garamond"
    base = "Manrope"

  [params.colors]
    primary = "#4F6B61"
    black = "#2A211C"
    white = "#ffffff"
    white_offset = "#F7F0E7"
    grey = "#71625B"
    secondary = "#C8D0BC"
    accent_dark = "#A2674C"
    accent_warm = "#E8C7A7"

  [params.seo]
    meta_twitter_site = "@zerostaticio"
    meta_twitter_creator = "@zerostaticio"
    meta_og_image = "images/logo/logo.svg"

  [params.services]
    summary_truncate = 120 # How many characters to include in the summary of the services before truncating

  [params.team]
    summary_large_truncate = 120 # How many characters to include in the summary of the team bios (large layout) before truncating

  [params.footer]
    copyright_text = "&copy; Wang's Harmony Acupuncture LLC"

[menu]
  # Main Menu
  [[menu.main]]
    name = "Services and Fees"
    url = "/services/"
    weight = 1

  [[menu.main]]
    name = "Questions"
    url = "/blog/"
    weight = 2

  [[menu.main]]
    name = "About"
    url = "/team/"
    weight = 3

  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 4

  # Footer Menu
  [[menu.footer]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.footer]]
    name = "Contact"
    url = "/contact/"
    weight = 2
